<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minimal TTS</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-color: #ffffff; --text-color: #000000; --bar-bg: #f8f9fa; 
            --input-bg: #ffffff; --border-color: #cccccc; --hl-color: #ffff99; 
        }
        body.dark-mode { 
            --bg-color: #000000; --text-color: #ffffff; --bar-bg: #121212; 
            --input-bg: #1e1e1e; --border-color: #333333; --hl-color: #555500; 
        }
        
        body, textarea, select, input { font-family: 'Lexend', sans-serif; }
        body { margin: 0; padding: 0; background-color: var(--bg-color); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        textarea { 
            flex-grow: 1; width: 100vw; 
            padding: 20px; padding-bottom: 140px; 
            background-color: var(--input-bg); color: var(--text-color); 
            border: none; outline: none; box-sizing: border-box; resize: none; font-size: 16px; line-height: 1.5;
        }
        
        .bar-container { position: fixed; bottom: 0; left: 0; width: 100%; display: flex; flex-direction: column-reverse; z-index: 10; background: var(--bg-color); }
        
        .bar { 
            background: var(--bar-bg); border-top: 1px solid var(--border-color); 
            display: flex; align-items: center; padding: 10px 20px; gap: 15px; 
            box-sizing: border-box; min-height: 60px;
            overflow-x: auto; white-space: nowrap; scrollbar-width: none; -webkit-overflow-scrolling: touch;
        }
        .bar::-webkit-scrollbar { display: none; }
        
        #settingsBar, #editBar { display: none; border-top: none; }
        #mainBar { justify-content: flex-start; }
        
        #voiceSelect { 
            height: 35px; cursor: pointer; background: transparent; 
            border: 1px solid var(--border-color); border-radius: 6px; 
            color: var(--text-color); padding: 0 10px; font-size: 13px; max-width: 150px;
        }
        
        /* Generic Popup Dropups */
        .popup-menu {
            display: none; position: absolute; bottom: 65px; left: 15px; 
            background: var(--bar-bg); border: 1px solid var(--border-color); border-radius: 8px; 
            padding: 10px 15px; flex-direction: row; gap: 15px; align-items: center;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.15); z-index: 20;
        }
        .popup-menu.show { display: flex; }
        
        #audioPopup { left: auto; right: 15px; }
        #searchPopup { left: 95px; padding: 8px 12px; }
        #searchPopup input { border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-color); padding: 5px 8px; border-radius: 4px; width: 120px; outline: none; }
        
        .control-wrapper { display: flex; flex-direction: column; align-items: center; gap: 4px; margin: 0 5px; }
        .control-buttons { display: flex; align-items: center; gap: 8px; }
        .label-text { font-size: 10px; font-weight: 600; color: var(--text-color); opacity: 0.7; letter-spacing: 0.5px; }
        
        button { border: none; background: transparent; cursor: pointer; display: flex; align-items: center; padding: 5px; border-radius: 6px; transition: background 0.2s; }
        button:active { background: var(--border-color); }
        svg { width: 22px; height: 22px; fill: var(--text-color); }
        
        .num-btn { font-weight: bold; font-size: 16px; width: 30px; height: 30px; justify-content: center; background: var(--border-color); border-radius: 50%; opacity: 0.8; }
        .val-span { cursor: pointer; min-width: 40px; text-align: center; font-size: 14px; font-weight: 500; }
        
        #charCount { font-size: 14px; color: #888; font-weight: 500; margin-right: auto; padding-left: 5px; }
        #playBtn { margin-left: auto; }
        
        ::selection { background: var(--hl-color); color: var(--text-color); }
    </style>
</head>
<body class="dark-mode">

    <textarea id="textInput" placeholder="Paste or type your text here..."></textarea>

    <div class="bar-container">
        <div id="mainBar" class="bar">
            <button onclick="toggleBar('settingsBar')" title="Settings">
                <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.63l-1.92-3.33c-.12-.22-.37-.31-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.63l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.63l1.92 3.33c.12.22.37.31.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.48-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.33c.12-.22.07-.47-.12-.63l-2.03-1.58zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/></svg>
            </button>
            <button onclick="toggleBar('editBar')" title="Edit Tools">
                <svg viewBox="0 0 24 24"><path d="M19 19V5H5v14h14M3 3h18v18H3V3zm13.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83zM7 14.25V18h3.75l7.06-7.06-3.75-3.75L7 14.25z"/></svg>
            </button>
            <button onclick="togglePopup('searchPopup')" title="Search">
                <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            </button>
            <span id="charCount">0</span>
            <button id="playBtn" onclick="toggleSpeech()" title="Play/Pause">
                <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </button>
        </div>

        <div id="searchPopup" class="popup-menu">
            <input type="text" id="searchInput" placeholder="Find..." oninput="findNext(true)">
            <button onclick="findPrev()"><svg viewBox="0 0 24 24"><path d="M12 8l-6 6 1.41 1.41L12 10.83l4.59 4.58L18 14z"/></svg></button>
            <button onclick="findNext()"><svg viewBox="0 0 24 24"><path d="M16.59 8.59L12 13.17 7.41 8.59 6 10l6 6 6-6z"/></svg></button>
        </div>

        <div id="settingsBar" class="bar">
            <button onclick="togglePopup('appearancePopup')" title="Appearance">
                <svg viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9c.83 0 1.5-.67 1.5-1.5 0-.39-.15-.74-.39-1.01-.23-.26-.38-.61-.38-.99 0-.83.67-1.5 1.5-1.5H16c2.76 0 5-2.24 5-5 0-4.42-4.03-8-9-8zm-5.5 9c-.83 0-1.5-.67-1.5-1.5S5.67 9 6.5 9 8 9.67 8 10.5 7.33 12 6.5 12zm3-4C8.67 8 8 7.33 8 6.5S8.67 5 9.5 5s1.5.67 1.5 1.5S10.33 8 9.5 8zm5 0c-.83 0-1.5-.67-1.5-1.5S13.67 5 14.5 5s1.5.67 1.5 1.5S15.33 8 14.5 8zm3 4c-.83 0-1.5-.67-1.5-1.5S16.67 9 17.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
            </button>
            <select id="voiceSelect" title="Select Language"></select>
            <button onclick="togglePopup('audioPopup')" title="Audio Controls">
                <svg viewBox="0 0 24 24"><path d="M3 17v2h6v-2H3zM3 5v2h10V5H3zm10 16v-2h8v-2h-8v-2h-2v6h2zM7 9v2H3v2h4v2h2V9H7zm14 4v-2H11v2h10zm-6-4h2V7h4V5h-4V3h-2v6z"/></svg>
            </button>
            <button onclick="toggleBar('mainBar')" title="Back" style="margin-left:auto;"><svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg></button>
        </div>

        <div id="appearancePopup" class="popup-menu">
            <button onclick="toggleTheme()" title="Toggle Theme"><svg viewBox="0 0 24 24"><path d="M12 2v20c5.52 0 10-4.48 10-10S17.52 2 12 2z"/></svg></button>
            <button id="hlBtn" onclick="toggleHighlight()" title="Toggle Highlight"><svg viewBox="0 0 24 24"><path d="M6 20h12v-3.5l-6-6-6 6V20zM17.5 10.5l2.6-2.6c.4-.4.4-1 0-1.4l-3.2-3.2c-.4-.4-1-.4-1.4 0L13.5 6 17.5 10.5z"/></svg></button>
        </div>

        <div id="audioPopup" class="popup-menu">
            <div class="control-wrapper"><span class="label-text">VOLUME</span><div class="control-buttons"><button class="num-btn" onclick="adj('vol', -0.05)">-</button><span class="val-span" id="valVol" ondblclick="resetVal('vol')">1.00</span><button class="num-btn" onclick="adj('vol', 0.05)">+</button></div></div>
            <div class="control-wrapper"><span class="label-text">SPEED</span><div class="control-buttons"><button class="num-btn" onclick="adj('rate', -0.05)">-</button><span class="val-span" id="valRate" ondblclick="resetVal('rate')">0.85</span><button class="num-btn" onclick="adj('rate', 0.05)">+</button></div></div>
            <div class="control-wrapper"><span class="label-text">PITCH</span><div class="control-buttons"><button class="num-btn" onclick="adj('pitch', -0.05)">-</button><span class="val-span" id="valPitch" ondblclick="resetVal('pitch')">1.00</span><button class="num-btn" onclick="adj('pitch', 0.05)">+</button></div></div>
        </div>

        <div id="editBar" class="bar">
            <button onclick="resetLS()" title="Reset Settings & Storage"><svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button>
            <button onclick="document.getElementById('textInput').select(); if(isPlaying) stopSpeech();" title="Select All"><svg viewBox="0 0 24 24"><path d="M3 3h2v2H3V3zm4 0h2v2H7V3zm4 0h2v2h-2V3zm4 0h2v2h-2V3zm4 0h2v2h-2V3zm0 4h2v2h-2V7zm0 4h2v2h-2v-2zm0 4h2v2h-2v-2zm0 4h2v2h-2v-2zM3 7h2v2H3V7zm0 4h2v2H3v-2zm0 4h2v2H3v-2zm0 4h2v2H3v-2zm4 4h2v2H7v-2zm4 0h2v2h-2v-2zm4 0h2v2h-2v-2z"/></svg></button>
            <button onclick="clearText()" title="Delete All"><svg viewBox="0 0 24 24"><path d="M22 3H7c-.69 0-1.23.35-1.59.88L0 12l5.41 8.11c.36.53.9.89 1.59.89h15c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-3 12.59L17.59 17 14 13.41 10.41 17 9 15.59 12.59 12 9 8.41 10.41 7 14 10.59 17.59 7 19 8.41 15.41 12 19 15.59z"/></svg></button>
            <button onclick="copyText()" title="Copy"><svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg></button>
            <button onclick="pasteText()" title="Paste"><svg viewBox="0 0 24 24"><path d="M19 2h-4.18C14.4.84 13.3 0 12 0c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm7 18H5V4h2v3h10V4h2v16z"/></svg></button>
            <button onclick="undo()" title="Undo"><svg viewBox="0 0 24 24"><path d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/></svg></button>
            <button onclick="redo()" title="Redo"><svg viewBox="0 0 24 24"><path d="M18.4 10.6C16.55 8.99 14.15 8 11.5 8c-4.65 0-8.58 3.03-9.96 7.22L3.9 16c1.05-3.19 4.06-5.5 7.6-5.5 1.95 0 3.73.72 5.12 1.88L13 16h9V7l-3.6 3.6z"/></svg></button>
            <button onclick="toggleBar('mainBar')" title="Back" style="margin-left:auto;"><svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg></button>
        </div>
    </div>

    <script>
        // State Variables
        let rate = 0.85, pitch = 1.0, vol = 1.0;
        let isHighlighting = false;
        
        let textChunks = [];
        let currentChunkIndex = 0;
        let isPlaying = false;
        let isPaused = false;
        
        // Undo / Redo Variables
        let historyStack = [''];
        let hIndex = 0;
        let isHistoryUpdate = false;
        
        const input = document.getElementById('textInput');
        const iconPath = document.getElementById('playIcon');
        const synth = window.speechSynthesis;
        
        const playPath = "M8 5v14l11-7z";
        const pausePath = "M6 19h4V5H6v14zm8-14v14h4V5h-4z";

        // --- UI Navigation ---
        function closeAllPopups() {
            document.querySelectorAll('.popup-menu').forEach(p => p.classList.remove('show'));
        }
        function togglePopup(id) {
            const el = document.getElementById(id);
            const isShowing = el.classList.contains('show');
            closeAllPopups();
            if (!isShowing) el.classList.add('show');
        }
        function toggleBar(barId) {
            closeAllPopups();
            document.getElementById('mainBar').style.display = 'none';
            document.getElementById('settingsBar').style.display = 'none';
            document.getElementById('editBar').style.display = 'none';
            document.getElementById(barId).style.display = 'flex';
        }
        function toggleSettings() { toggleBar('settingsBar'); }
        function toggleEdit() { toggleBar('editBar'); }

        // --- Search Functionality ---
        function findNext(reset = false) {
            let sInput = document.getElementById('searchInput').value;
            if(!sInput) return;
            let text = input.value;
            let startPos = reset ? 0 : input.selectionEnd;
            let idx = text.toLowerCase().indexOf(sInput.toLowerCase(), startPos);
            if(idx === -1) idx = text.toLowerCase().indexOf(sInput.toLowerCase(), 0); // loop
            if(idx !== -1) {
                input.setSelectionRange(idx, idx + sInput.length);
                input.blur(); input.focus(); 
            }
        }
        function findPrev() {
            let sInput = document.getElementById('searchInput').value;
            if(!sInput) return;
            let text = input.value;
            let idx = text.toLowerCase().lastIndexOf(sInput.toLowerCase(), input.selectionStart - 1);
            if(idx === -1) idx = text.toLowerCase().lastIndexOf(sInput.toLowerCase(), text.length);
            if(idx !== -1) {
                input.setSelectionRange(idx, idx + sInput.length);
                input.blur(); input.focus(); 
            }
        }

        // --- Local Storage Management ---
        function saveSettings() {
            localStorage.setItem('tts_text', input.value);
            localStorage.setItem('tts_rate', rate);
            localStorage.setItem('tts_pitch', pitch);
            localStorage.setItem('tts_vol', vol);
            localStorage.setItem('tts_hl', isHighlighting);
            localStorage.setItem('tts_dark', document.body.classList.contains('dark-mode'));
        }

        function loadSettings() {
            if(localStorage.getItem('tts_text') !== null) { input.value = localStorage.getItem('tts_text'); historyStack[0] = input.value; }
            if(localStorage.getItem('tts_rate')) { rate = parseFloat(localStorage.getItem('tts_rate')); document.getElementById('valRate').textContent = rate.toFixed(2); }
            if(localStorage.getItem('tts_pitch')) { pitch = parseFloat(localStorage.getItem('tts_pitch')); document.getElementById('valPitch').textContent = pitch.toFixed(2); }
            if(localStorage.getItem('tts_vol')) { vol = parseFloat(localStorage.getItem('tts_vol')); document.getElementById('valVol').textContent = vol.toFixed(2); }
            if(localStorage.getItem('tts_hl') === 'true') { isHighlighting = true; document.getElementById('hlBtn').style.opacity = "1"; }
            if(localStorage.getItem('tts_dark') === 'false') { document.body.classList.remove('dark-mode'); }
            updateCharCount();
        }

        function resetLS() {
            localStorage.clear();
            location.reload();
        }

        // --- Editor History (Undo/Redo) & Text ---
        function saveHistory(val) {
            if (isHistoryUpdate || historyStack[hIndex] === val) return;
            historyStack = historyStack.slice(0, hIndex + 1);
            historyStack.push(val);
            if (historyStack.length > 50) historyStack.shift(); else hIndex++;
            saveSettings();
        }

        function undo() {
            if (hIndex > 0) {
                hIndex--; isHistoryUpdate = true;
                input.value = historyStack[hIndex];
                isHistoryUpdate = false; updateCharCount(); saveSettings();
            }
        }

        function redo() {
            if (hIndex < historyStack.length - 1) {
                hIndex++; isHistoryUpdate = true;
                input.value = historyStack[hIndex];
                isHistoryUpdate = false; updateCharCount(); saveSettings();
            }
        }

        function clearText() {
            input.value = '';
            saveHistory('');
            updateCharCount();
            if(isPlaying) stopSpeech();
        }

        async function copyText() {
            try { await navigator.clipboard.writeText(input.value); } 
            catch (err) { alert("Copy failed or access denied."); }
        }

        async function pasteText() { 
            try {
                const t = await navigator.clipboard.readText(); 
                input.value = t; 
                input.setSelectionRange(0,0); // Start at 0 on fresh paste
                saveHistory(input.value);
                updateCharCount(); 
                if (isPlaying) stopSpeech();
            } catch (err) { alert("Clipboard access denied or not supported."); }
        }

        function handleUserInteraction() { if (isPlaying) stopSpeech(); closeAllPopups(); }
        
        input.addEventListener('click', handleUserInteraction);
        input.addEventListener('keyup', (e) => {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) handleUserInteraction();
        });
        input.addEventListener('input', () => { 
            updateCharCount();
            saveHistory(input.value);
            handleUserInteraction();
        });
        
        window.onload = () => { loadSettings(); input.focus(); };

        function toggleTheme() { document.body.classList.toggle('dark-mode'); saveSettings(); }
        function toggleHighlight() { isHighlighting = !isHighlighting; document.getElementById('hlBtn').style.opacity = isHighlighting ? "1" : "0.5"; saveSettings(); }
        function updateCharCount() { document.getElementById('charCount').textContent = input.value.length.toLocaleString('de-DE'); }

        // --- Settings Adjustments ---
        function adj(type, val) { 
            if (type === 'rate') { rate = Math.max(0.5, Math.min(2, rate + val)); document.getElementById('valRate').textContent = rate.toFixed(2); } 
            else if (type === 'pitch') { pitch = Math.max(0, Math.min(2, pitch + val)); document.getElementById('valPitch').textContent = pitch.toFixed(2); }
            else { vol = Math.max(0, Math.min(1, vol + val)); document.getElementById('valVol').textContent = vol.toFixed(2); }
            saveSettings();
        }
        function resetVal(type) {
            if (type === 'rate') { rate = 1.00; document.getElementById('valRate').textContent = "1.00"; }
            else if (type === 'pitch') { pitch = 1.00; document.getElementById('valPitch').textContent = "1.00"; }
            else { vol = 1.00; document.getElementById('valVol').textContent = "1.00"; }
            saveSettings();
        }

        // --- Voice Loading ---
        function populateVoices() {
            const s = document.getElementById('voiceSelect');
            s.innerHTML = '<option value="">Default Voice</option>';
            synth.getVoices().forEach(v => {
                const o = document.createElement('option');
                o.textContent = v.lang; o.value = v.name;
                if (v.lang === 'en-US') o.selected = true;
                s.appendChild(o);
            });
        }
        synth.onvoiceschanged = populateVoices;
        populateVoices(); 

        // --- Chunking Algorithm ---
        function buildChunks(text, startIndex = 0) {
            const MAX_LEN = 150; 
            let chunks = [];
            let current = startIndex;
            
            while (current < text.length) {
                let chunkEnd = current + MAX_LEN;
                if (chunkEnd >= text.length) {
                    chunkEnd = text.length;
                } else {
                    let segment = text.substring(current, chunkEnd);
                    let breakPoint = segment.search(/[.!?\n;](?!.*\w)/);
                    if (breakPoint !== -1) {
                        chunkEnd = current + breakPoint + 1;
                    } else {
                        let spacePoint = segment.lastIndexOf(" ");
                        if (spacePoint !== -1) chunkEnd = current + spacePoint + 1;
                    }
                }
                chunks.push({ text: text.substring(current, chunkEnd), start: current, end: chunkEnd });
                current = chunkEnd;
            }
            return chunks;
        }

        // --- Speech Playback Logic ---
        function toggleSpeech() {
            closeAllPopups();
            if (isPlaying) {
                if (!isPaused) {
                    isPaused = true;
                    synth.cancel(); 
                    iconPath.innerHTML = `<path d="${playPath}"/>`;
                } else {
                    isPaused = false;
                    playCurrentChunk();
                    iconPath.innerHTML = `<path d="${pausePath}"/>`;
                }
            } else {
                const text = input.value;
                if (!text.trim()) return;
                
                // Auto-restart if cursor is exactly at the end
                if (input.selectionStart === text.length && text.length > 0) {
                    input.setSelectionRange(0, 0);
                }
                
                textChunks = buildChunks(text, input.selectionStart);
                currentChunkIndex = 0;
                isPlaying = true;
                isPaused = false;
                
                synth.cancel(); 
                playCurrentChunk();
                iconPath.innerHTML = `<path d="${pausePath}"/>`;
            }
        }

        function playCurrentChunk() {
            if (currentChunkIndex >= textChunks.length) {
                stopSpeech();
                input.setSelectionRange(input.value.length, input.value.length);
                return;
            }
            
            let chunk = textChunks[currentChunkIndex];
            let u = new SpeechSynthesisUtterance(chunk.text);
            
            u.rate = rate; 
            u.pitch = pitch; 
            u.volume = vol;
            const voiceName = document.getElementById('voiceSelect').value;
            if (voiceName) u.voice = synth.getVoices().find(v => v.name === voiceName);
            
            // True Word-by-word Highlight (onboundary)
            u.onboundary = (e) => { 
                if (isHighlighting && e.name === 'word') {
                    let wordLen = e.charLength || 0;
                    if (!wordLen) { // Fallback for browsers that don't pass charLength
                        let sub = chunk.text.substring(e.charIndex);
                        let spaceIdx = sub.search(/[\s.,!?]/);
                        wordLen = spaceIdx > 0 ? spaceIdx : sub.length;
                    }
                    input.setSelectionRange(chunk.start + e.charIndex, chunk.start + e.charIndex + wordLen);
                } 
            };
            
            u.onend = () => {
                if (isPlaying && !isPaused) {
                    currentChunkIndex++;
                    playCurrentChunk();
                }
            };
            
            u.onerror = (e) => {
                if (e.error !== 'canceled' && isPlaying && !isPaused) {
                    currentChunkIndex++;
                    playCurrentChunk();
                }
            };

            synth.speak(u);
        }

        function stopSpeech() {
            isPlaying = false;
            isPaused = false;
            synth.cancel();
            iconPath.innerHTML = `<path d="${playPath}"/>`;
        }
    </script>
</body>
</html>
