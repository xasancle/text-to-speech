<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
    <title>Minimal TTS</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Lexend', sans-serif !important; box-sizing: border-box; }
        
        :root { 
            --bg-color: #ffffff; --text-color: #000000; --bar-bg: #f8f9fa; 
            --input-bg: #ffffff; --border-color: #cccccc; 
        }
        body.dark-mode { 
            --bg-color: #000000; --text-color: #ffffff; --bar-bg: #121212; 
            --input-bg: #1e1e1e; --border-color: #333333; 
        }
        
        body { margin: 0; padding: 0; background-color: var(--bg-color); height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }
        
        textarea { 
            flex-grow: 1; width: 100vw; 
            padding: 20px; padding-bottom: 200px; 
            background-color: var(--input-bg); color: var(--text-color); 
            border: none; outline: none; resize: none; font-size: 16px; line-height: 1.5;
        }
        
        /* Bar Structure */
        .bar-container { position: fixed; bottom: 0; left: 0; width: 100%; display: flex; flex-direction: column-reverse; z-index: 10; background: var(--bg-color); }
        .bar { background: var(--bar-bg); border-top: 1px solid var(--border-color); display: flex; align-items: center; gap: 10px; height: 60px; min-height: 60px; padding-left: 10px; padding-right: 0; overflow: visible; }
        
        /* Tooltips Logic */
        button[data-tooltip] { position: relative; border: none; background: transparent; cursor: pointer; display: flex; align-items: center; padding: 6px; border-radius: 6px; transition: background 0.2s; }
        button[data-tooltip]::before {
            content: attr(data-tooltip); position: absolute; left: 50%; transform: translateX(-50%);
            background: var(--text-color); color: var(--bg-color); padding: 5px 10px; border-radius: 4px; 
            font-size: 11px; font-weight: 600; white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity 0.15s; z-index: 1000;
        }
        #mainBar button[data-tooltip]::before { bottom: 115%; top: auto; }
        .bar:not(#mainBar) button[data-tooltip]::before { top: 115%; bottom: auto; }
        button[data-tooltip].tooltip-visible::before { opacity: 1; }
        button:active { background: var(--border-color); }
        svg { width: 22px; height: 22px; fill: var(--text-color); }
        
        /* Dropups Popups */
        .popup-menu { display: none; position: absolute; background: var(--input-bg); color: var(--text-color); border: 1px solid var(--text-color); border-radius: 8px; box-shadow: 0 -4px 10px rgba(0,0,0,0.25); z-index: 20; }
        .popup-menu.show { display: flex; }
        
        #audioPopup, #counterPopup, #voicePopup, #pauseLinePopup, #pauseCommaPopup, #pauseDotPopup { bottom: 120px; flex-direction: column; align-items: stretch; border-bottom-left-radius: 0; border-bottom-right-radius: 0; border-bottom: none; }
        
        /* General Control Styling */
        .control-wrapper { display: flex; flex-direction: column; align-items: center; gap: 4px; margin: 0 5px; padding: 10px 15px; }
        #audioPopup { padding: 5px 0; gap: 5px; }
        .control-buttons { display: flex; align-items: center; gap: 8px; }
        .label-text { font-size: 10px; font-weight: 600; opacity: 0.8; letter-spacing: 0.5px; margin-top: 2px; }
        .num-btn { font-weight: bold; font-size: 16px; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; background: var(--border-color); border-radius: 50%; opacity: 0.9; padding: 0; color: var(--text-color); }
        .val-span { cursor: pointer; min-width: 40px; text-align: center; font-size: 14px; font-weight: 500; }
        
        /* Spreadsheet Count Dropup */
        #counterPopup { padding: 0; border-collapse: collapse; min-width: 170px; overflow: hidden; }
        .counter-row { display: flex; font-size: 13px; }
        .counter-cell { border-bottom: 1px solid var(--border-color); padding: 8px 12px; flex: 1; }
        .counter-cell.val { font-weight: bold; border-right: 1px solid var(--border-color); text-align: left; }
        .counter-cell.txt { text-align: right; }
        .counter-row:last-child .counter-cell { border-bottom: none; }
        
        /* Voice Dropup */
        #voicePopup { padding: 0; max-height: 250px; overflow-y: auto; }
        .voice-btn { width: 100%; text-align: left; padding: 12px 15px; border-radius: 0; font-size: 13px; font-weight: 600; color: var(--text-color); background: var(--input-bg); border-bottom: 1px solid var(--border-color); cursor: pointer; }
        .voice-btn:hover { background: var(--border-color); }
        .voice-btn:last-child { border-bottom: none; }

        /* Text Buttons */
        .txt-btn { font-size: 13px; font-weight: 600; padding: 6px 12px; border: 1px solid var(--border-color); border-radius: 6px; background: transparent; color: var(--text-color); cursor: pointer; }
        .txt-btn:active { background: var(--border-color); }

        /* Dynamic Tabs */
        .tabs-wrapper { display: flex; height: 100%; flex-grow: 1; border-left: 1px solid var(--border-color); margin-left: auto; overflow-x: auto; scrollbar-width: none; }
        .tabs-wrapper::-webkit-scrollbar { display: none; }
        .tab-btn { 
            position: relative; flex-shrink: 0; height: 100%; border: none; border-right: 1px solid var(--border-color); 
            border-radius: 0; background: transparent; color: var(--text-color); opacity: 0.6; 
            font-size: 13px; font-weight: 500; padding: 0 30px 0 15px; text-align: center; transition: 0.2s;
            display: flex; align-items: center; justify-content: center; outline: none; min-width: 100px; max-width: 150px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .tab-btn.active { opacity: 1; font-weight: 600; background: var(--border-color); }
        .tab-close { position: absolute; right: 5px; top: 50%; transform: translateY(-50%); width: 20px; height: 20px; font-size: 12px; display: flex; align-items: center; justify-content: center; border-radius: 50%; color: var(--text-color); background: transparent; border: none; cursor: pointer; opacity: 0.7; }
        .tab-close:hover { background: rgba(255,0,0,0.6); color: white; opacity: 1; }
        .add-tab-btn { min-width: 50px; height: 100%; border: none; background: transparent; color: var(--text-color); font-size: 20px; font-weight: 300; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .add-tab-btn:active { background: var(--border-color); }

        /* Search input */
        #searchInput { flex-grow: 1; border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-color); padding: 6px 10px; border-radius: 4px; outline: none; font-size: 14px; min-width: 0; }

        /* Loader */
        .loader-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background: rgba(0,0,0,0.85); z-index: 100; flex-direction: column; justify-content: center; align-items: center; color: #ffffff; text-align: center; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-left-color: #ffffff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        ::selection { background: #cccccc; color: #000000; }
    </style>
</head>
<body class="dark-mode">

    <textarea id="textInput" spellcheck="false"></textarea>

    <div id="loaderOverlay" class="loader-overlay">
        <div id="spinner" class="spinner"></div>
        <div id="loaderText" style="font-weight: 500; font-size: 16px; letter-spacing: 0.5px;"></div>
    </div>

    <div class="bar-container">
        
        <div id="mainBar" class="bar">
            <button onclick="toggleMainBar('settingsBar')" data-tooltip="Settings">
                <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.63l-1.92-3.33c-.12-.22-.37-.31-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.63l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.63l1.92 3.33c.12.22.37.31.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.48-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.33c.12-.22.07-.47-.12-.63l-2.03-1.58zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/></svg>
            </button>
            <button onclick="toggleMainBar('editBar')" data-tooltip="Edit">
                <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
            </button>
            <button onclick="toggleMainBar('searchBar')" data-tooltip="Search">
                <span style="transform: scaleX(-1); display: flex;"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></span>
            </button>
            <button id="playBtn" onclick="toggleSpeech()" data-tooltip="Play/Pause">
                <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </button>
            
            <div class="tabs-wrapper" id="tabsWrapper"></div>
        </div>

        <div id="editBar" class="bar" style="display:none;">
            <button onclick="resetLS()" data-tooltip="Reset Local"><svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button>
            <button onclick="document.getElementById('textInput').select(); if(isPlaying) stopSpeech();" data-tooltip="Select All"><svg viewBox="0 0 24 24"><path d="M3 5h2V3c-1.1 0-2 .9-2 2zm0 8h2v-2H3v2zm4 8h2v-2H7v2zM3 9h2V7H3v2zm10-6h-2v2h2V3zm6 0v2h2c0-1.1-.9-2-2-2zM5 21v-2H3c0 1.1.9 2 2 2zm-2-4h2v-2H3v2zM9 3H7v2h2V3zm2 18h2v-2h-2v2zm8-8h2v-2h-2v2zm0 8c1.1 0 2-.9 2-2h-2v2zm0-12h2V7h-2v2zm0 8h2v-2h-2v2zm-4 4h2v-2h-2v2zm0-16h2V3h-2v2zM7 17h10V7H7v10zm2-8h6v6H9V9z"/></svg></button>
            <button onclick="clearText()" data-tooltip="Delete All"><svg viewBox="0 0 24 24"><path d="M22 3H7c-.69 0-1.23.35-1.59.88L0 12l5.41 8.11c.36.53.9.89 1.59.89h15c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-3 12.59L17.59 17 14 13.41 10.41 17 9 15.59 12.59 12 9 8.41 10.41 7 14 10.59 17.59 7 19 8.41 15.41 12 19 15.59z"/></svg></button>
            <button onclick="copyText()" data-tooltip="Copy"><svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg></button>
            <button onclick="pasteText()" data-tooltip="Paste"><svg viewBox="0 0 24 24"><path d="M19 2h-4.18C14.4.84 13.3 0 12 0c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm7 18H5V4h2v3h10V4h2v16z"/></svg></button>
            <button onclick="undo()" data-tooltip="Undo"><svg viewBox="0 0 24 24"><path d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/></svg></button>
            <button onclick="redo()" data-tooltip="Redo"><svg viewBox="0 0 24 24"><path d="M18.4 10.6C16.55 8.99 14.15 8 11.5 8c-4.65 0-8.58 3.03-9.96 7.22L3.9 16c1.05-3.19 4.06-5.5 7.6-5.5 1.95 0 3.73.72 5.12 1.88L13 16h9V7l-3.6 3.6z"/></svg></button>
        </div>

        <div id="searchBar" class="bar" style="display:none;">
            <button onmousedown="event.preventDefault(); goToBottom()" data-tooltip="Bottom"><svg viewBox="0 0 24 24"><path d="M20 12l-1.41-1.41L13 16.17V4h-2v12.17l-5.58-5.59L4 12l8 8 8-8z"/></svg></button>
            <button onmousedown="event.preventDefault(); goToTop()" data-tooltip="Top"><svg viewBox="0 0 24 24"><path d="M4 12l1.41 1.41L11 7.83V20h2V7.83l5.58 5.59L20 12l-8-8-8 8z"/></svg></button>
            <input type="text" id="searchInput" placeholder="Find text..." oninput="findNext(true)">
            <button onclick="findPrev()" data-tooltip="Previous"><svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg></button>
            <button onclick="findNext()" data-tooltip="Next"><svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg></button>
        </div>

        <div id="settingsBar" class="bar" style="display:none;">
            <button onclick="toggleAppearanceBar()" data-tooltip="Appearance">
                <svg viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9c.83 0 1.5-.67 1.5-1.5 0-.39-.15-.74-.39-1.01-.23-.26-.38-.61-.38-.99 0-.83.67-1.5 1.5-1.5H16c2.76 0 5-2.24 5-5 0-4.42-4.03-8-9-8zm-5.5 9c-.83 0-1.5-.67-1.5-1.5S5.67 9 6.5 9 8 9.67 8 10.5 7.33 12 6.5 12zm3-4C8.67 8 8 7.33 8 6.5S8.67 5 9.5 5s1.5.67 1.5 1.5S10.33 8 9.5 8zm5 0c-.83 0-1.5-.67-1.5-1.5S13.67 5 14.5 5s1.5.67 1.5 1.5S15.33 8 14.5 8zm3 4c-.83 0-1.5-.67-1.5-1.5S16.67 9 17.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
            </button>
            <button onclick="togglePopup('counterPopup', this)" data-tooltip="Count">
                <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-6 4h6v2h-6V7zm0 4h6v2h-6v-2zm0 4h6v2h-6v-2zM7 6h4v4H7V6zm0 8h4v4H7v-4z"/></svg>
            </button>
            <button onclick="togglePopup('voicePopup', this)" data-tooltip="Voice">
                <svg viewBox="0 0 24 24"><path d="M3 3h18v18H3V3zm4 5h10v2H7V8zm0 4h10v2H7v-2zm0 4h7v2H7v-2z"/></svg>
            </button>
            <button onclick="togglePopup('audioPopup', this)" data-tooltip="Audio Control">
                <svg viewBox="0 0 24 24"><path d="M3 17v2h6v-2H3zM3 5v2h10V5H3zm10 16v-2h8v-2h-8v-2h-2v6h2zM7 9v2H3v2h4v2h2V9H7zm14 4v-2H11v2h10zm-6-4h2V7h4V5h-4V3h-2v6z"/></svg>
            </button>
            <button onclick="togglePunctuationBar()" data-tooltip="Punctuation">
                <svg viewBox="0 0 24 24"><path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/></svg>
            </button>
        </div>

        <div id="appearanceBar" class="bar" style="display:none;">
            <button onclick="toggleTheme()" data-tooltip="Toggle Theme"><svg viewBox="0 0 24 24"><path d="M12 2v20c5.52 0 10-4.48 10-10S17.52 2 12 2z"/></svg></button>
        </div>

        <div id="punctuationBar" class="bar" style="display:none;">
            <button class="txt-btn" onclick="togglePopup('pauseLinePopup', this)" data-tooltip="Paragraph Pause">Line</button>
            <button class="txt-btn" onclick="togglePopup('pauseCommaPopup', this)" data-tooltip="Comma Pause">Comma</button>
            <button class="txt-btn" onclick="togglePopup('pauseDotPopup', this)" data-tooltip="Dot Pause">Dot</button>
        </div>

    </div>

    <div id="pauseLinePopup" class="popup-menu">
        <div class="control-wrapper"><div class="control-buttons"><button class="num-btn" onclick="adjPause('line', -100)">-</button><span class="val-span" id="valPauseLine" ondblclick="resetPause('line')">1000</span><button class="num-btn" onclick="adjPause('line', 100)">+</button></div><span class="label-text">MS</span></div>
    </div>
    <div id="pauseCommaPopup" class="popup-menu">
        <div class="control-wrapper"><div class="control-buttons"><button class="num-btn" onclick="adjPause('comma', -50)">-</button><span class="val-span" id="valPauseComma" ondblclick="resetPause('comma')">200</span><button class="num-btn" onclick="adjPause('comma', 50)">+</button></div><span class="label-text">MS</span></div>
    </div>
    <div id="pauseDotPopup" class="popup-menu">
        <div class="control-wrapper"><div class="control-buttons"><button class="num-btn" onclick="adjPause('dot', -50)">-</button><span class="val-span" id="valPauseDot" ondblclick="resetPause('dot')">400</span><button class="num-btn" onclick="adjPause('dot', 50)">+</button></div><span class="label-text">MS</span></div>
    </div>

    <div id="counterPopup" class="popup-menu">
        <div class="counter-row">
            <div class="counter-cell val" id="timeCountDisplay">0m 0s</div><div class="counter-cell txt">Time</div>
        </div>
        <div class="counter-row">
            <div class="counter-cell val" id="charCountDisplay">0</div><div class="counter-cell txt">Character</div>
        </div>
        <div class="counter-row">
            <div class="counter-cell val" id="lineCountDisplay">1</div><div class="counter-cell txt">Line</div>
        </div>
    </div>

    <div id="voicePopup" class="popup-menu"></div>

    <div id="audioPopup" class="popup-menu">
        <div class="control-wrapper">
            <div class="control-buttons"><button class="num-btn" onclick="adj('pitch', -0.05)">-</button><span class="val-span" id="valPitch" ondblclick="resetVal('pitch')">1.00</span><button class="num-btn" onclick="adj('pitch', 0.05)">+</button></div>
            <span class="label-text">PITCH</span>
        </div>
        <div class="control-wrapper">
            <div class="control-buttons"><button class="num-btn" onclick="adj('rate', -0.05)">-</button><span class="val-span" id="valRate" ondblclick="resetVal('rate')">0.85</span><button class="num-btn" onclick="adj('rate', 0.05)">+</button></div>
            <span class="label-text">SPEED</span>
        </div>
        <div class="control-wrapper">
            <div class="control-buttons"><button class="num-btn" onclick="adj('vol', -0.05)">-</button><span class="val-span" id="valVol" ondblclick="resetVal('vol')">1.00</span><button class="num-btn" onclick="adj('vol', 0.05)">+</button></div>
            <span class="label-text">VOLUME</span>
        </div>
    </div>

    <script>
        let rate = 0.85, pitch = 1.0, vol = 1.0, selectedVoiceName = "";
        let pauseLine = 1000, pauseComma = 200, pauseDot = 400;
        let textChunks = [], currentChunkIndex = 0, isPlaying = false, isPaused = false;
        
        const input = document.getElementById('textInput');
        const iconPath = document.getElementById('playIcon');
        const synth = window.speechSynthesis;
        const playPath = "M8 5v14l11-7z", pausePath = "M6 19h4V5H6v14zm8-14v14h4V5h-4z";

        // --- Background Notification Media Session Setup ---
        const silentAudio = new Audio('data:audio/mpeg;base64,SUQzBAAAAAAAI1RTU0UAAAAPAAADTGF2ZjU2LjM2LjEwMAAAAAAAAAAAAAAA//OEAAAAAAAAAAAAAAAAAAAAAAAASW5mbwAAAA8AAAAEAAABIADBwsPEx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcH/////////8AAABHTEFNRTMuOThyA7oAAAAAAAAAADQgJDFiTQABAAABIAAAAAAAAAAA//OEABAAAAAAgAAAAAAAADxIQQkIADzZAAAAAABAAADzZAAAAAABAAADzZAAAAAABAAADzZAAAAAABAAADzZAAAAAABAAADzZAAAAAABAAADzZAAAAAABAAADzZAAAAAABAAAD//OEABAAAAAAgAAAAAAAADxIQQkIADzZAAAAAABAAADzZAAAAAABAAADzZAAAAAABAAADzZAAAAAABAAADzZAAAAAABAAADzZAAAAAABAAADzZAAAAAABAAADzZAAAAAABAAAD//OEABAAAAAAgAAAAAAAADxIQQkIADzZAAAAAABAAADzZAAAAAABAAADzZAAAAAABAAADzZAAAAAABAAADzZAAAAAABAAADzZAAAAAABAAADzZAAAAAABAAADzZAAAAAABAAAD');
        silentAudio.loop = true;
        let audioUnlocked = false;

        // Unlock audio context on the absolute first touch event globally so the device allows it
        function unlockAudio() {
            if (!audioUnlocked) {
                silentAudio.play().then(() => {
                    silentAudio.pause();
                    silentAudio.currentTime = 0;
                    audioUnlocked = true;
                }).catch(() => {});
                document.removeEventListener('touchstart', unlockAudio);
                document.removeEventListener('click', unlockAudio);
            }
        }
        document.addEventListener('touchstart', unlockAudio, { once: true });
        document.addEventListener('click', unlockAudio, { once: true });

        function updateMediaSession(state) {
            if ('mediaSession' in navigator) {
                let tabName = tabs.find(t => t.id === activeTabId)?.name || 'Minimal TTS';
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: tabName,
                    artist: state === 'Playing' ? 'Reading Text...' : 'Paused',
                });
                navigator.mediaSession.playbackState = state === 'Playing' ? 'playing' : 'paused';
            }
        }

        if ('mediaSession' in navigator) {
            navigator.mediaSession.setActionHandler('play', () => { if (isPaused) toggleSpeech(); });
            navigator.mediaSession.setActionHandler('pause', () => { if (isPlaying && !isPaused) toggleSpeech(); });
            navigator.mediaSession.setActionHandler('stop', () => { if (isPlaying) stopSpeech(); });
        }

        // Keyboard Viewport Adaptability Fix
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', () => {
                document.body.style.height = window.visualViewport.height + 'px';
                window.scrollTo(0, 0);
            });
        }

        // --- Tooltips Logic ---
        function initTooltips() {
            document.querySelectorAll('button[data-tooltip]').forEach(btn => {
                const show = () => btn.classList.add('tooltip-visible');
                const hide = () => btn.classList.remove('tooltip-visible');
                btn.onpointerdown = show; btn.onpointerup = hide; btn.onpointerleave = hide; btn.onpointercancel = hide;
                btn.ontouchstart = show; btn.ontouchend = hide; btn.ontouchcancel = hide;
            });
        }
        initTooltips();

        // --- UI Navigation ---
        function closeAllPopups() { document.querySelectorAll('.popup-menu').forEach(p => p.classList.remove('show')); }

        function toggleMainBar(barId) {
            closeAllPopups();
            const bar = document.getElementById(barId);
            const isCurrentlyOpen = bar.style.display === 'flex';
            
            document.getElementById('searchBar').style.display = 'none';
            document.getElementById('editBar').style.display = 'none';
            document.getElementById('settingsBar').style.display = 'none';
            document.getElementById('appearanceBar').style.display = 'none';
            document.getElementById('punctuationBar').style.display = 'none';
            
            if (!isCurrentlyOpen) bar.style.display = 'flex';
        }

        function toggleAppearanceBar() {
            closeAllPopups();
            document.getElementById('punctuationBar').style.display = 'none';
            const aBar = document.getElementById('appearanceBar');
            aBar.style.display = (aBar.style.display === 'flex') ? 'none' : 'flex';
        }

        function togglePunctuationBar() {
            closeAllPopups();
            document.getElementById('appearanceBar').style.display = 'none';
            const pBar = document.getElementById('punctuationBar');
            pBar.style.display = (pBar.style.display === 'flex') ? 'none' : 'flex';
        }

        function togglePopup(id, btnElement) {
            const el = document.getElementById(id);
            const isShowing = el.classList.contains('show');
            closeAllPopups();
            if (!isShowing) {
                if (btnElement) {
                    const rect = btnElement.getBoundingClientRect();
                    el.style.left = Math.max(0, rect.left) + 'px';
                }
                el.classList.add('show');
            }
        }

        // --- Autosave & Dynamic Tabs ---
        let tabs = JSON.parse(localStorage.getItem('tts_tabs')) || [{ id: Date.now(), name: "File 1.txt", content: "" }];
        let activeTabId = parseInt(localStorage.getItem('tts_active_tab')) || tabs[0].id;
        let tabHistory = {};

        function initTabHistory(id) { if (!tabHistory[id]) tabHistory[id] = { stack: [''], index: 0 }; }

        function saveTabs() {
            let currentTab = tabs.find(t => t.id === activeTabId);
            if (currentTab) currentTab.content = input.value;
            localStorage.setItem('tts_tabs', JSON.stringify(tabs));
            localStorage.setItem('tts_active_tab', activeTabId);
        }

        function renderTabs() {
            const wrapper = document.getElementById('tabsWrapper');
            wrapper.innerHTML = '';
            tabs.forEach(tab => {
                initTabHistory(tab.id);
                if (tab.id === activeTabId && tabHistory[tab.id].stack[0] === '') tabHistory[tab.id].stack[0] = tab.content;
                
                const btn = document.createElement('button');
                btn.className = `tab-btn ${tab.id === activeTabId ? 'active' : ''}`;
                btn.ondblclick = () => renameTab(btn, tab.id);
                btn.onclick = (e) => { if (e.target.tagName !== 'BUTTON') switchTab(tab.id); };
                btn.textContent = tab.name;
                
                const closeBtn = document.createElement('button');
                closeBtn.className = 'tab-close'; closeBtn.innerHTML = '✕';
                closeBtn.onclick = (e) => { e.stopPropagation(); closeTab(tab.id); };
                btn.appendChild(closeBtn);
                wrapper.appendChild(btn);
            });
            
            const addBtn = document.createElement('button');
            addBtn.className = 'add-tab-btn'; addBtn.textContent = '+';
            addBtn.onclick = addTab;
            wrapper.appendChild(addBtn);
        }

        function switchTab(id) {
            if (isPlaying) stopSpeech();
            saveTabs(); activeTabId = id;
            let targetTab = tabs.find(t => t.id === id);
            input.value = targetTab ? targetTab.content : '';
            renderTabs(); updateCharCount(); input.focus();
        }

        function addTab() {
            let newId = Date.now();
            tabs.push({ id: newId, name: `File ${tabs.length + 1}.txt`, content: "" });
            initTabHistory(newId); switchTab(newId);
        }

        function closeTab(id) {
            if (tabs.length === 1) return alert("Cannot close the last file.");
            if (!confirm("Are you sure you want to close this file?")) return;
            
            tabs = tabs.filter(t => t.id !== id);
            delete tabHistory[id];
            if (activeTabId === id) activeTabId = tabs[0].id;
            switchTab(activeTabId);
        }

        function renameTab(el, id) {
            el.contentEditable = true; el.focus();
            let text = el.childNodes[0].nodeValue || el.textContent;
            let dotIdx = text.lastIndexOf('.'); if (dotIdx === -1) dotIdx = text.length;
            
            let sel = window.getSelection(); let range = document.createRange();
            range.setStart(el.childNodes[0], 0); range.setEnd(el.childNodes[0], dotIdx);
            sel.removeAllRanges(); sel.addRange(range);

            el.onblur = () => { 
                el.contentEditable = false; 
                let t = tabs.find(t => t.id === id);
                if (t) t.name = el.childNodes[0].nodeValue.trim() || 'Untitled.txt';
                saveTabs(); renderTabs();
            };
            el.onkeydown = (e) => { if (e.key === 'Enter') { e.preventDefault(); el.blur(); } };
        }

        // --- Voice Selection ---
        function populateVoices() {
            const popup = document.getElementById('voicePopup'); popup.innerHTML = '';
            synth.getVoices().forEach(v => {
                const b = document.createElement('button');
                b.className = 'voice-btn'; b.textContent = v.name + " (" + v.lang + ")";
                if (v.lang === 'en-US' && selectedVoiceName === "") selectedVoiceName = v.name;
                b.onclick = () => { selectedVoiceName = v.name; togglePopup('voicePopup'); };
                popup.appendChild(b);
            });
        }
        synth.onvoiceschanged = populateVoices;

        // --- Search ---
        function findNext(reset = false) {
            let sInput = document.getElementById('searchInput').value; if(!sInput) return;
            let startPos = reset ? 0 : input.selectionEnd;
            let idx = input.value.toLowerCase().indexOf(sInput.toLowerCase(), startPos);
            if(idx === -1) idx = input.value.toLowerCase().indexOf(sInput.toLowerCase(), 0); 
            if(idx !== -1) { input.setSelectionRange(idx, idx + sInput.length); input.focus(); }
        }
        function findPrev() {
            let sInput = document.getElementById('searchInput').value; if(!sInput) return;
            let idx = input.value.toLowerCase().lastIndexOf(sInput.toLowerCase(), input.selectionStart - 1);
            if(idx === -1) idx = input.value.toLowerCase().lastIndexOf(sInput.toLowerCase(), input.value.length);
            if(idx !== -1) { input.setSelectionRange(idx, idx + sInput.length); input.focus(); }
        }
        function goToTop() { input.setSelectionRange(0, 0); input.scrollTop = 0; input.focus(); }
        function goToBottom() { input.setSelectionRange(input.value.length, input.value.length); input.scrollTop = input.scrollHeight; input.focus(); }

        // --- Edit Tools & History ---
        let isHistoryUpdate = false;
        function saveHistory(val) {
            let th = tabHistory[activeTabId];
            if (isHistoryUpdate || th.stack[th.index] === val) return;
            th.stack = th.stack.slice(0, th.index + 1); th.stack.push(val);
            if (th.stack.length > 50) th.stack.shift(); else th.index++;
            saveTabs();
        }
        function undo() { let th = tabHistory[activeTabId]; if (th.index > 0) { th.index--; isHistoryUpdate = true; input.value = th.stack[th.index]; isHistoryUpdate = false; updateCharCount(); saveTabs(); } }
        function redo() { let th = tabHistory[activeTabId]; if (th.index < th.stack.length - 1) { th.index++; isHistoryUpdate = true; input.value = th.stack[th.index]; isHistoryUpdate = false; updateCharCount(); saveTabs(); } }

        function clearText() { input.value = ''; saveHistory(''); updateCharCount(); if(isPlaying) stopSpeech(); }
        
        async function copyText() { 
            const selected = input.value.substring(input.selectionStart, input.selectionEnd);
            if (!selected) return alert("Please highlight text to copy.");
            try { await navigator.clipboard.writeText(selected); } 
            catch (err) { document.execCommand('copy'); } 
        }
        async function pasteText() { 
            try { 
                input.value = await navigator.clipboard.readText(); 
                input.setSelectionRange(0,0); saveHistory(input.value); updateCharCount(); 
                if (isPlaying) stopSpeech(); 
            } 
            catch (err) { alert("Please use your device's paste function."); } 
        }

        input.addEventListener('paste', () => { setTimeout(() => { input.setSelectionRange(0, 0); input.focus(); saveHistory(input.value); updateCharCount(); }, 10); });

        // --- Settings / Storage ---
        function loadSettings() {
            let savedTabs = localStorage.getItem('tts_tabs');
            if (savedTabs) { tabs = JSON.parse(savedTabs); activeTabId = parseInt(localStorage.getItem('tts_active_tab')); }
            
            let target = tabs.find(t => t.id === activeTabId);
            input.value = target ? target.content : '';
            
            if(localStorage.getItem('tts_rate')) { rate = parseFloat(localStorage.getItem('tts_rate')); document.getElementById('valRate').textContent = rate.toFixed(2); }
            if(localStorage.getItem('tts_pitch')) { pitch = parseFloat(localStorage.getItem('tts_pitch')); document.getElementById('valPitch').textContent = pitch.toFixed(2); }
            if(localStorage.getItem('tts_vol')) { vol = parseFloat(localStorage.getItem('tts_vol')); document.getElementById('valVol').textContent = vol.toFixed(2); }
            if(localStorage.getItem('tts_dark') === 'false') { document.body.classList.remove('dark-mode'); }
            
            if(localStorage.getItem('tts_pauseLine')) { pauseLine = parseInt(localStorage.getItem('tts_pauseLine')); document.getElementById('valPauseLine').textContent = pauseLine; }
            if(localStorage.getItem('tts_pauseComma')) { pauseComma = parseInt(localStorage.getItem('tts_pauseComma')); document.getElementById('valPauseComma').textContent = pauseComma; }
            if(localStorage.getItem('tts_pauseDot')) { pauseDot = parseInt(localStorage.getItem('tts_pauseDot')); document.getElementById('valPauseDot').textContent = pauseDot; }
            
            renderTabs(); updateCharCount();
        }
        
        function resetLS() { 
            if (!confirm("Are you sure you want to delete all settings and local storage?")) return;
            localStorage.clear(); location.reload(); 
        }

        function toggleTheme() { document.body.classList.toggle('dark-mode'); localStorage.setItem('tts_dark', document.body.classList.contains('dark-mode')); }
        
        function updateCharCount() { 
            const text = input.value;
            document.getElementById('charCountDisplay').textContent = text.length.toLocaleString('de-DE'); 
            document.getElementById('lineCountDisplay').textContent = (text.split('\n').length).toLocaleString('de-DE'); 
            const wordCount = text.trim().split(/\s+/).filter(Boolean).length;
            const totalSecs = Math.round((wordCount / 150) * 60);
            document.getElementById('timeCountDisplay').textContent = `${Math.floor(totalSecs / 60)}m ${totalSecs % 60}s`; 
            saveTabs();
        }

        // --- Audio & Punctuation Controls ---
        function adj(type, val) { 
            if (type === 'rate') { rate = Math.max(0.5, Math.min(2, rate + val)); document.getElementById('valRate').textContent = rate.toFixed(2); localStorage.setItem('tts_rate', rate); } 
            else if (type === 'pitch') { pitch = Math.max(0, Math.min(2, pitch + val)); document.getElementById('valPitch').textContent = pitch.toFixed(2); localStorage.setItem('tts_pitch', pitch); }
            else { vol = Math.max(0, Math.min(1, vol + val)); document.getElementById('valVol').textContent = vol.toFixed(2); localStorage.setItem('tts_vol', vol); }
        }
        function resetVal(type) {
            if (type === 'rate') { rate = 1.00; document.getElementById('valRate').textContent = "1.00"; localStorage.setItem('tts_rate', rate); }
            else if (type === 'pitch') { pitch = 1.00; document.getElementById('valPitch').textContent = "1.00"; localStorage.setItem('tts_pitch', pitch); }
            else { vol = 1.00; document.getElementById('valVol').textContent = "1.00"; localStorage.setItem('tts_vol', vol); }
        }

        function adjPause(type, val) {
            if(type==='line') { pauseLine = Math.max(0, pauseLine + val); document.getElementById('valPauseLine').textContent = pauseLine; localStorage.setItem('tts_pauseLine', pauseLine); }
            else if(type==='comma') { pauseComma = Math.max(0, pauseComma + val); document.getElementById('valPauseComma').textContent = pauseComma; localStorage.setItem('tts_pauseComma', pauseComma); }
            else if(type==='dot') { pauseDot = Math.max(0, pauseDot + val); document.getElementById('valPauseDot').textContent = pauseDot; localStorage.setItem('tts_pauseDot', pauseDot); }
        }
        function resetPause(type) {
            if(type==='line') { pauseLine = 1000; document.getElementById('valPauseLine').textContent = "1000"; localStorage.setItem('tts_pauseLine', 1000); }
            else if(type==='comma') { pauseComma = 200; document.getElementById('valPauseComma').textContent = "200"; localStorage.setItem('tts_pauseComma', 200); }
            else if(type==='dot') { pauseDot = 400; document.getElementById('valPauseDot').textContent = "400"; localStorage.setItem('tts_pauseDot', 400); }
        }

        // --- Punctuation-Aware Speech Engine ---
        function buildChunks(text, startIndex = 0) {
            const MAX_LEN = 150; let chunks = []; let current = startIndex;
            while (current < text.length) {
                let chunkEnd = current + MAX_LEN;
                if (chunkEnd >= text.length) chunkEnd = text.length;
                else {
                    let segment = text.substring(current, chunkEnd);
                    let match = segment.match(/.*(\n{2,}|\.\s|\?\s|!\s|,\s)/);
                    if (match) {
                        chunkEnd = current + match[0].length;
                    } else {
                        let spacePoint = segment.lastIndexOf(" ");
                        if (spacePoint !== -1) chunkEnd = current + spacePoint + 1;
                    }
                }
                chunks.push({ text: text.substring(current, chunkEnd), start: current, end: chunkEnd });
                current = chunkEnd;
            }
            return chunks;
        }

        function toggleSpeech() {
            closeAllPopups();
            if (isPlaying) {
                if (!isPaused) { 
                    isPaused = true; 
                    synth.cancel(); 
                    silentAudio.pause(); 
                    iconPath.innerHTML = `<path d="${playPath}"/>`; 
                    updateMediaSession('Paused');
                } else { 
                    isPaused = false; 
                    silentAudio.play().catch(() => console.log('Audio Autoplay Blocked'));
                    playCurrentChunk(); 
                    iconPath.innerHTML = `<path d="${pausePath}"/>`; 
                    updateMediaSession('Playing');
                }
            } else {
                const text = input.value; if (!text.trim()) return;
                if (input.selectionStart === text.length && text.length > 0) input.setSelectionRange(0, 0);

                // Play silent audio immediately on button click to trigger media session correctly
                silentAudio.play().catch(() => console.log('Audio Autoplay Blocked'));
                updateMediaSession('Playing');

                const wordCount = text.substring(input.selectionStart).trim().split(/\s+/).filter(Boolean).length;
                const totalSecs = Math.round((wordCount / 150) * 60);
                
                document.getElementById('spinner').style.display = 'block';
                document.getElementById('loaderText').innerHTML = `Preparing...`;
                document.getElementById('loaderOverlay').style.display = 'flex';
                
                setTimeout(() => {
                    textChunks = buildChunks(text, input.selectionStart);
                    currentChunkIndex = 0;
                    
                    document.getElementById('spinner').style.display = 'none';
                    document.getElementById('loaderText').innerHTML = `<div style="font-size:32px; font-weight:bold; margin-top:10px;">${Math.floor(totalSecs / 60)}m ${totalSecs % 60}s</div>`;
                    
                    setTimeout(() => {
                        document.getElementById('loaderOverlay').style.display = 'none';
                        isPlaying = true; isPaused = false;
                        synth.cancel(); playCurrentChunk();
                        iconPath.innerHTML = `<path d="${pausePath}"/>`;
                    }, 2000); 
                    
                }, 100);
            }
        }

        function playCurrentChunk() {
            if (currentChunkIndex >= textChunks.length) { stopSpeech(); input.setSelectionRange(input.value.length, input.value.length); return; }
            
            let chunk = textChunks[currentChunkIndex];
            let cleanText = chunk.text.replace(/([^\n])\n([^\n])/g, '$1 $2').replace(/\n+/g, ' ');
            let u = new SpeechSynthesisUtterance(cleanText);
            
            u.rate = rate; u.pitch = pitch; u.volume = vol;
            if (selectedVoiceName) u.voice = synth.getVoices().find(v => v.name === selectedVoiceName);
            
            u.onend = () => { 
                if (isPlaying && !isPaused) { 
                    currentChunkIndex++; 
                    let delay = 0;
                    if (chunk.text.match(/\n{2,}\s*$/)) delay = pauseLine;
                    else if (chunk.text.match(/,\s*$/)) delay = pauseComma;
                    else if (chunk.text.match(/[.!?]\s*$/)) delay = pauseDot;
                    
                    if (delay > 0) setTimeout(() => playCurrentChunk(), delay);
                    else playCurrentChunk(); 
                } 
            };
            u.onerror = (e) => { if (e.error !== 'canceled' && isPlaying && !isPaused) { currentChunkIndex++; playCurrentChunk(); } };

            synth.speak(u);
        }

        function stopSpeech() { 
            isPlaying = false; isPaused = false; synth.cancel(); 
            iconPath.innerHTML = `<path d="${playPath}"/>`; 
            silentAudio.pause(); 
            silentAudio.currentTime = 0;
            updateMediaSession('Paused');
        }
        
        function handleUserInteraction() { if (isPlaying) stopSpeech(); closeAllPopups(); }
        input.addEventListener('click', handleUserInteraction);
        input.addEventListener('keyup', (e) => { if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) handleUserInteraction(); });
        input.addEventListener('input', () => { updateCharCount(); saveHistory(input.value); handleUserInteraction(); });

        window.onload = () => { localStorage.removeItem('tab_loaded_once'); loadSettings(); populateVoices(); input.focus(); };

    </script>
</body>
